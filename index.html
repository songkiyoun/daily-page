<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>절기문자 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c11;--s:rgba(255,255,255,.05);--b:rgba(255,255,255,.09);
  --gold:#c9a96e;--gs:rgba(201,169,110,.16);--gb:rgba(201,169,110,.32);
  --text:#fff;--dim:rgba(255,255,255,.45);--mid:rgba(255,255,255,.72);
  --green:#5fcf85;--red:#e05555;--orange:#e8923a;--blue:#5b9bd5;--r:10px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;padding:20px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.htitle{font-family:'Playfair Display',serif;font-size:22px;color:#fff}
.htitle em{color:var(--gold);font-style:normal}
.hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:7px 14px;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--gb);color:var(--gold)}
.btn.primary{background:var(--gold);border:none;color:#0c0c11;font-weight:700}
.btn.primary:hover{background:#d9ba82;color:#0c0c11}
.status-line{font-size:12px;color:var(--dim);margin-top:4px}

/* FILTER TABS */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.ftab{background:var(--s);border:1px solid var(--b);border-radius:7px;padding:5px 14px;font-size:12.5px;color:var(--dim);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .16s}
.ftab.on{background:var(--gs);border-color:var(--gb);color:var(--gold);font-weight:600}
.fsep{color:var(--b);font-size:18px;margin:0 4px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px}
.kpi-lbl{font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:700;color:#fff}
.kpi-val.ok{color:var(--green)}
.kpi-val.warn{color:var(--orange)}
.kpi-val.dim{color:var(--dim)}
.kpi-sub{font-size:11.5px;color:var(--dim);margin-top:4px}

/* SECTION */
.sec{margin-bottom:18px}
.sec-title{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--b)}

/* MANAGER CARD */
.mgr-list{display:flex;flex-direction:column;gap:8px}
.mgr-card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;transition:border-color .18s}
.mgr-card:hover{border-color:var(--gb)}
.mgr-head{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;user-select:none}
.mgr-name{font-size:15px;font-weight:700;color:#fff;flex:1}
.mgr-badges{display:flex;gap:6px;flex-wrap:wrap}
.mgr-arrow{color:var(--dim);font-size:13px;transition:transform .2s;flex-shrink:0}
.mgr-card.open .mgr-arrow{transform:rotate(90deg)}
.mgr-body{display:none;border-top:1px solid var(--b);padding:10px 15px}
.mgr-card.open .mgr-body{display:block}
.cli-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.cli-row:last-child{border-bottom:none;padding-bottom:0}
.cli-name{flex:1;color:var(--mid)}
.cli-stat{display:flex;gap:6px}
.cli-chip{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:600}
.chip-on{background:rgba(95,207,133,.15);color:var(--green);border:1px solid rgba(95,207,133,.3)}
.chip-off{background:var(--s);color:var(--dim);border:1px solid var(--b)}

/* TAG */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9px;font-size:10.5px;font-weight:700;white-space:nowrap}
.tag.g{background:rgba(95,207,133,.15);color:var(--green);border:1px solid rgba(95,207,133,.3)}
.tag.r{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.tag.o{background:rgba(232,146,58,.15);color:var(--orange);border:1px solid rgba(232,146,58,.3)}
.tag.gold{background:var(--gs);color:var(--gold);border:1px solid var(--gb)}
.tag.b{background:rgba(91,155,213,.12);color:var(--blue);border:1px solid rgba(91,155,213,.25)}
.tag.dim{background:rgba(255,255,255,.06);color:var(--dim);border:1px solid var(--b)}

/* JOLGI TIMELINE */
.jolgi-list{display:flex;flex-direction:column;gap:10px}
.jolgi-card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;transition:border-color .16s}
.jolgi-card:hover{border-color:var(--gb)}
.jolgi-card.past{opacity:.55}
.jolgi-card.urgent{border-left:3px solid var(--red)}
.jolgi-card.soon{border-left:3px solid var(--orange)}
.jolgi-card.today-card{border-left:3px solid var(--gold);background:var(--gs)}
.jolgi-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.jolgi-dday{min-width:68px;text-align:center;flex-shrink:0}
.jolgi-dday-num{font-size:18px;font-weight:700;line-height:1}
.jolgi-dday-num.urgent{color:var(--red)}
.jolgi-dday-num.soon{color:var(--orange)}
.jolgi-dday-num.ok{color:var(--green)}
.jolgi-dday-num.past{color:var(--dim)}
.jolgi-dday-lbl{font-size:10px;color:var(--dim);margin-top:2px}
.jolgi-info{flex:1}
.jolgi-date{font-size:11.5px;color:var(--dim);margin-bottom:3px}
.jolgi-name{font-size:15px;font-weight:700;color:#fff}
.jolgi-total{font-size:12px;color:var(--dim);margin-top:2px}
.jolgi-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.jstat{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.04);border-radius:8px;padding:7px 12px;min-width:60px}
.jstat-num{font-size:16px;font-weight:700;color:#fff}
.jstat-lbl{font-size:10px;color:var(--dim);margin-top:2px}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .4s}
.prog-pct{font-size:11px;color:var(--dim);flex-shrink:0;min-width:30px;text-align:right}
.prog-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.prog-legend span{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
.prog-legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* LOADING / ERROR */
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px}
.spin{width:22px;height:22px;border:2px solid var(--b);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
.spin-t{font-size:13px;color:var(--dim)}
.err-box{background:rgba(224,85,85,.07);border:1px solid rgba(224,85,85,.25);border-radius:var(--r);padding:16px 18px;color:#ffaaaa;font-size:13.5px;line-height:1.75}
.err-box strong{color:#fff}
.empty{text-align:center;color:var(--dim);font-size:13px;padding:28px;font-style:italic}
.debug-box{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:8px;padding:12px 14px;font-family:monospace;font-size:11.5px;color:var(--dim);margin-top:12px;line-height:1.8;word-break:break-all;max-height:200px;overflow-y:auto}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:up .3s ease}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="htitle">📨 절기문자 <em>테스트</em></div>
    <div class="status-line" id="statusLine">데이터 로드 대기 중</div>
  </div>
  <div class="hbtns">
    <button class="btn" onclick="toggleDebug()">🔧 디버그</button>
    <button class="btn primary" onclick="loadData()">↻ 데이터 로드</button>
  </div>
</div>

<div id="debugBox" class="debug-box" style="display:none;margin-bottom:16px"></div>

<div id="app">
  <div class="spin-wrap"><div class="spin"></div><div class="spin-t">로드 버튼을 눌러주세요</div></div>
</div>

<script>
// ── CONFIG ───────────────────────────────────
const SHEET_ID = '1DFG4bhJdpWl9a_4K2a4xlekgoUso3aDwEZRi2BeCPYA';
const SHEET_GID = '0'; // 시트1
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

const PROXIES = [
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// ── STATE ────────────────────────────────────
let rawRows = [];
let clients = [];   // {manager, name, txtTotal, txtSent, txtRemain, carTotal, carSent, carRemain}
let jolgiDates = []; // {dateStr, dateObj, name, total, ready, confirm, done, col}
let filterMode = 'all'; // 'all' | 'thisMonth' | 'nextMonth'
let openManagers = new Set();
let debugMode = false;

// ── HELPERS ──────────────────────────────────
function todayD(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysDiff(a,b){return Math.round((a-b)/86400000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function n(s){return parseInt((s||'0').replace(/[^\d-]/g,''))||0;}
function fmtDate(d){
  if(!d||isNaN(d))return '';
  return `${d.getFullYear()-2000}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function dbg(...args){
  if(!debugMode)return;
  const el=document.getElementById('debugBox');
  el.innerHTML+=args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' ')+'\n';
}
function toggleDebug(){
  debugMode=!debugMode;
  const el=document.getElementById('debugBox');
  el.style.display=debugMode?'block':'none';
  el.innerHTML='';
}
function setStatus(msg){document.getElementById('statusLine').textContent=msg;}

// ── CSV PARSER ───────────────────────────────
function csvParse(txt){
  const rows=[];
  for(const line of txt.replace(/\r/g,'').split('\n')){
    if(!line.trim())continue;
    const fields=[];let f='',q=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){q=!q;}
      else if(line[i]===','&&!q){fields.push(f);f='';}
      else f+=line[i];
    }
    fields.push(f);rows.push(fields);
  }
  return rows;
}

// ── FETCH ────────────────────────────────────
async function fetchCSV(){
  const to=ms=>new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms));
  for(const pf of PROXIES){
    try{
      const url=pf(CSV_URL);
      dbg('Trying proxy:', url.substring(0,60)+'...');
      const res=await Promise.race([fetch(url),to(15000)]);
      if(!res.ok)throw new Error('status '+res.status);
      const txt=await res.text();
      if(!txt||txt.startsWith('<!'))throw new Error('bad response');
      dbg('Success! Length:', txt.length, 'chars');
      dbg('First 200 chars:', txt.substring(0,200));
      return txt;
    }catch(e){dbg('Proxy fail:', e.message);}
  }
  throw new Error('모든 프록시 실패');
}

// ── PARSE ────────────────────────────────────
function parseAll(rows){
  // BB열 = index 53 (A=0, B=1 ... Z=25, AA=26, AB=27 ... AZ=51, BA=52, BB=53)
  const BB_COL = 53;

  // ── 클라이언트 파싱 (6행부터 = idx 5)
  clients = [];
  for(let i=5;i<rows.length;i++){
    const r=rows[i];
    const manager=(r[1]||'').trim();
    const name=(r[2]||'').trim();
    if(!name||!manager)continue;
    const txtTotal=n(r[3]),txtSent=n(r[4]),txtRemain=n(r[5]);
    const carTotal=n(r[6]),carSent=n(r[7]),carRemain=n(r[8]);
    if(!txtTotal&&!carTotal)continue; // 데이터 없는 행 건너뜀
    clients.push({manager,name,txtTotal,txtSent,txtRemain,carTotal,carSent,carRemain});
  }
  dbg(`Clients parsed: ${clients.length}`);
  if(clients.length>0)dbg('First client:', clients[0]);

  // ── 절기 날짜 파싱 (BB1~ = col 53)
  jolgiDates = [];
  const dateRow = rows[0]||[];   // 1행 (idx 0) = 날짜
  const nameRow = rows[2]||[];   // 3행 (idx 2) = 절기명
  const totalRow= rows[3]||[];   // 4행 (idx 3) = 총 개수

  for(let col=BB_COL;col<dateRow.length;col++){
    const dateStr=(dateRow[col]||'').trim();
    const jolgiName=(nameRow[col]||'').trim();
    if(!dateStr||!jolgiName)continue;

    const dm=dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(!dm)continue;
    const dateObj=new Date(+dm[1],+dm[2]-1,+dm[3]);

    const totalFromRow4=n(totalRow[col]);

    // 5행(idx4)부터 아래 집계
    let total=0,ready=0,confirm=0,done=0;
    for(let row=4;row<rows.length;row++){
      const val=(rows[row]?.[col]||'').trim();
      if(!val||val==='0')continue;
      total++;
      if(val.includes('_예정'))ready++;
      else if(val.includes('_컨펌중')||val.includes('_컨펌중'))confirm++;
      else if(val.includes('_완'))done++;
    }

    // totalFromRow4가 있으면 그걸 우선 사용
    const useTotal=totalFromRow4||total||0;
    if(useTotal===0&&total===0)continue;

    jolgiDates.push({dateStr,dateObj,name:jolgiName,total:useTotal||total,ready,confirm,done,col});
  }
  jolgiDates.sort((a,b)=>a.dateObj-b.dateObj);
  dbg(`Jolgi dates parsed: ${jolgiDates.length}`);
  if(jolgiDates.length>0)dbg('First jolgi:', jolgiDates[0]);
}

// ── LOAD ─────────────────────────────────────
async function loadData(){
  const app=document.getElementById('app');
  const dbgEl=document.getElementById('debugBox');
  if(debugMode)dbgEl.innerHTML='';
  app.innerHTML=`<div class="spin-wrap"><div class="spin"></div><div class="spin-t">데이터 불러오는 중…</div></div>`;
  setStatus('로드 중…');

  try{
    const csv=await fetchCSV();
    rawRows=csvParse(csv);
    dbg(`Total rows parsed: ${rawRows.length}`);
    dbg(`Total cols in row0: ${(rawRows[0]||[]).length}`);
    parseAll(rawRows);
    setStatus(`클라이언트 ${clients.length}건 · 절기 ${jolgiDates.length}건 로드 완료`);
    render();
  }catch(e){
    dbg('LOAD ERROR:', e.message);
    setStatus('로드 실패');
    app.innerHTML=`<div class="err-box">
      <strong>⚠ 데이터 로드 실패</strong><br><br>
      ${esc(e.message)}<br><br>
      • 시트가 <strong>링크 공유 — 뷰어 이상</strong>으로 설정되어 있어야 합니다<br>
      • 🔧 디버그 버튼으로 상세 오류를 확인해보세요<br>
      • GitHub Pages 배포 환경에서는 정상 작동할 수 있습니다
    </div>`;
  }
}

// ── RENDER ───────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const today=todayD();
  const thisM=today.getMonth();
  const thisY=today.getFullYear();
  const nextM=(thisM+1)%12;
  const nextY=thisM===11?thisY+1:thisY;

  // 필터 적용
  let filteredJolgi=jolgiDates;
  if(filterMode==='thisMonth'){
    filteredJolgi=jolgiDates.filter(j=>j.dateObj.getFullYear()===thisY&&j.dateObj.getMonth()===thisM);
  } else if(filterMode==='nextMonth'){
    filteredJolgi=jolgiDates.filter(j=>j.dateObj.getFullYear()===nextY&&j.dateObj.getMonth()===nextM);
  }

  // ── KPI 계산
  const activeClients=clients.filter(c=>(c.txtRemain>0||c.carRemain>0));
  const endedClients=clients.filter(c=>c.txtRemain<=0&&c.carRemain<=0&&(c.txtTotal>0||c.carTotal>0));
  const thisMonthJolgi=jolgiDates.filter(j=>j.dateObj.getFullYear()===thisY&&j.dateObj.getMonth()===thisM);
  const thisMonthTotal=thisMonthJolgi.reduce((s,j)=>s+j.total,0);
  const thisMonthDone=thisMonthJolgi.reduce((s,j)=>s+j.done,0);
  const thisMonthPct=thisMonthTotal?Math.round(thisMonthDone/thisMonthTotal*100):0;

  // ── 담당자별 집계
  const byMgr={};
  clients.forEach(c=>{
    const m=c.manager||'미지정';
    if(!byMgr[m])byMgr[m]={active:[],ended:[]};
    const isActive=c.txtRemain>0||c.carRemain>0;
    if(isActive)byMgr[m].active.push(c);
    else byMgr[m].ended.push(c);
  });

  let html='<div class="fade">';

  // ── KPI
  html+=`<div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-lbl">총 클라이언트</div>
      <div class="kpi-val">${clients.length}명</div>
      <div class="kpi-sub">문자대행 + 캐리커처 포함</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">진행중</div>
      <div class="kpi-val ok">${activeClients.length}명</div>
      <div class="kpi-sub">잔여건수 1건 이상</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">종료</div>
      <div class="kpi-val dim">${endedClients.length}명</div>
      <div class="kpi-sub">잔여건수 0 이하</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">이번달 완료율</div>
      <div class="kpi-val ${thisMonthPct>=100?'ok':thisMonthPct>50?'warn':''}">${thisMonthTotal?thisMonthPct+'%':'—'}</div>
      <div class="kpi-sub">${thisMonthDone}/${thisMonthTotal}건</div>
    </div>
  </div>`;

  // ── 영업담당자 실적
  html+=`<div class="sec"><div class="sec-title">👤 영업담당자 실적</div><div class="mgr-list">`;
  const mgrEntries=Object.entries(byMgr).sort((a,b)=>(b[1].active.length+b[1].ended.length)-(a[1].active.length+a[1].ended.length));
  if(!mgrEntries.length){
    html+=`<div class="empty">담당자 데이터 없음 — B열 확인 필요</div>`;
  } else {
    mgrEntries.forEach(([m,v])=>{
      const isOpen=openManagers.has(m);
      const all=[...v.active,...v.ended];
      html+=`<div class="mgr-card ${isOpen?'open':''}" id="mgr-${esc(m)}">
        <div class="mgr-head" onclick="toggleMgr('${esc(m).replace(/'/g,"\\'")}')">
          <div class="mgr-name">${esc(m)}</div>
          <div class="mgr-badges">
            ${v.active.length?`<span class="tag g">진행중 ${v.active.length}명</span>`:''}
            ${v.ended.length?`<span class="tag dim">종료 ${v.ended.length}명</span>`:''}
          </div>
          <div class="mgr-arrow">▶</div>
        </div>
        <div class="mgr-body">
          ${all.map(c=>`
            <div class="cli-row">
              <div class="cli-name">${esc(c.name)}</div>
              <div class="cli-stat">
                ${c.txtTotal?`<span class="cli-chip ${c.txtRemain>0?'chip-on':'chip-off'}">문자 ${c.txtRemain>0?'잔여'+c.txtRemain+'건':'완료'}</span>`:''}
                ${c.carTotal?`<span class="cli-chip ${c.carRemain>0?'chip-on':'chip-off'}">캐리 ${c.carRemain>0?'잔여'+c.carRemain+'건':'완료'}</span>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
  }
  html+=`</div></div>`;

  // ── 필터 탭
  html+=`<div class="sec"><div class="sec-title">📨 절기 발송 현황</div>
  <div class="filter-row">
    <button class="ftab ${filterMode==='all'?'on':''}" onclick="setFilter('all')">전체 (${jolgiDates.length}건)</button>
    <span class="fsep">|</span>
    <button class="ftab ${filterMode==='thisMonth'?'on':''}" onclick="setFilter('thisMonth')">이번달 (${thisMonthJolgi.length}건)</button>
    <button class="ftab ${filterMode==='nextMonth'?'on':''}" onclick="setFilter('nextMonth')">다음달 (${jolgiDates.filter(j=>j.dateObj.getFullYear()===nextY&&j.dateObj.getMonth()===nextM).length}건)</button>
  </div>`;

  if(!filteredJolgi.length){
    html+=`<div class="empty">해당 기간에 절기 발송 일정이 없습니다.</div>`;
  } else {
    html+=`<div class="jolgi-list">`;
    filteredJolgi.forEach(j=>{
      const d=daysDiff(j.dateObj,today);
      const isPast=d<0;
      const isToday=d===0;
      const isSoon=d>0&&d<=7;
      const isUrgent=d>0&&d<=2;

      let cardCls='jolgi-card';
      if(isPast)cardCls+=' past';
      else if(isToday)cardCls+=' today-card';
      else if(isUrgent)cardCls+=' urgent';
      else if(isSoon)cardCls+=' soon';

      let ddayNum='', ddayLbl='', ddayCls='ok';
      if(isToday){ddayNum='D-0';ddayLbl='오늘';ddayCls='warn';}
      else if(isPast){ddayNum=`D+${Math.abs(d)}`;ddayLbl='지남';ddayCls='past';}
      else{ddayNum=`D-${d}`;ddayLbl=d===1?'내일':`${d}일 후`;ddayCls=isUrgent?'urgent':isSoon?'soon':'ok';}

      const pctDone=j.total?Math.round(j.done/j.total*100):0;
      const pctConfirm=j.total?Math.round((j.confirm)/j.total*100):0;
      const pctReady=j.total?Math.round(j.ready/j.total*100):0;

      // 완료+컨펌+예정 누적 바
      const barDone=Math.min(pctDone,100);
      const barConfirm=Math.min(pctConfirm,100-barDone);
      const barReady=Math.min(pctReady,100-barDone-barConfirm);

      // 경고: 지난 날짜인데 예정·컨펌 남은 경우
      const hasLeftover=isPast&&(j.ready>0||j.confirm>0);

      html+=`<div class="${cardCls}">
        <div class="jolgi-top">
          <div class="jolgi-dday">
            <div class="jolgi-dday-num ${ddayCls}">${ddayNum}</div>
            <div class="jolgi-dday-lbl">${ddayLbl}</div>
          </div>
          <div class="jolgi-info">
            <div class="jolgi-date">${fmtDate(j.dateObj)}</div>
            <div class="jolgi-name">${esc(j.name)} ${hasLeftover?'<span class="tag r">⚠ 미완료 잔여</span>':''}</div>
            <div class="jolgi-total">전체 ${j.total}건</div>
          </div>
          <span class="tag ${pctDone>=100?'g':isToday||isUrgent?'r':isPast&&hasLeftover?'r':'gold'}">${pctDone}% 완료</span>
        </div>
        <div class="jolgi-stats">
          <div class="jstat"><div class="jstat-num">${j.total}</div><div class="jstat-lbl">전체</div></div>
          <div class="jstat"><div class="jstat-num" style="color:var(--dim)">${j.ready}</div><div class="jstat-lbl">예정</div></div>
          <div class="jstat"><div class="jstat-num" style="color:var(--orange)">${j.confirm}</div><div class="jstat-lbl">컨펌중</div></div>
          <div class="jstat"><div class="jstat-num" style="color:var(--green)">${j.done}</div><div class="jstat-lbl">완료</div></div>
        </div>
        <div class="prog-wrap">
          <div class="prog">
            <div style="height:100%;display:flex">
              <div class="prog-bar" style="width:${barDone}%;background:var(--green)"></div>
              <div class="prog-bar" style="width:${barConfirm}%;background:var(--orange)"></div>
              <div class="prog-bar" style="width:${barReady}%;background:rgba(255,255,255,.15)"></div>
            </div>
          </div>
          <div class="prog-pct">${pctDone}%</div>
        </div>
        <div class="prog-legend">
          <span><span class="dot" style="background:var(--green)"></span>완료 ${j.done}</span>
          <span><span class="dot" style="background:var(--orange)"></span>컨펌중 ${j.confirm}</span>
          <span><span class="dot" style="background:rgba(255,255,255,.2)"></span>예정 ${j.ready}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`</div></div>`;
  app.innerHTML=html;
}

function toggleMgr(m){
  if(openManagers.has(m))openManagers.delete(m);
  else openManagers.add(m);
  render();
}

function setFilter(mode){
  filterMode=mode;
  render();
}

// 자동 로드
loadData();
</script>
</body>
</html>
